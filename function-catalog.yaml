# _meta function catalog — the rosetta stone.
#
# Each entry has a unique `id` that lives in no external namespace.
# The three optional mapping columns are:
#   internal:   Our IR node name. Drives codegen of ExprKind variants.
#   cel:        CEL function name (operator or method). How users write it.
#   substrait:  Substrait extension + name. For interop reference.
#
# Any of the three may be absent. An entry with no `internal` won't
# generate an IR node. An entry with no `cel` has no user-facing syntax
# (yet). An entry with no `substrait` is ours alone.
#
# Status values:
#   mapped    — clean mapping exists in all populated columns
#   partial   — mapping exists but semantics differ (see notes)
#   todo      — we want this but haven't wired it up yet
#   discard   — deliberately excluded (reason in notes)
#
# Type system for params/return:
#   Concrete types where known: bool, int, uint, double, string, bytes,
#     timestamp, duration, struct, type, dyn, any
#   Binding variables where params must unify: T, T2, K, V
#     All uses of the same variable within one entry must resolve to the
#     same concrete type. "T?" means nullable T.
#   Constraints narrow what a variable can bind to:
#     Comparable  — types that support == and != (all scalars, string, bytes,
#                   timestamp, duration)
#     Ordered     — types that support <, <=, >, >= (Comparable minus bool)
#     Numeric     — int, uint, double (and decimal when supported)
#     Summable    — Numeric plus duration and timestamp+duration combinations
#     Sizable     — string, bytes, list(T), map(K, V)
#     Castable    — types that support explicit conversion (most scalars,
#                   string, bytes, timestamp, duration)
#   Parameterized types: list(T), map(K, V), struct(...)
#
# Receiver notation: "string.contains" means method-style call in CEL.

# ═══════════════════════════════════════════════════════════════════════
#  BOOLEAN / LOGICAL
# ═══════════════════════════════════════════════════════════════════════

- id: logical_or
  internal: LogicalOr
  cel: "_||_"
  substrait: { ext: functions_boolean, name: or }
  status: mapped
  commutative: true
  short_circuits: true
  params: [bool, bool]
  return: bool

- id: logical_and
  internal: LogicalAnd
  cel: "_&&_"
  substrait: { ext: functions_boolean, name: and }
  status: mapped
  commutative: true
  short_circuits: true
  params: [bool, bool]
  return: bool

- id: logical_not
  internal: LogicalNot
  cel: "!_"
  substrait: { ext: functions_boolean, name: not }
  status: mapped
  params: [bool]
  return: bool

- id: and_not
  substrait: { ext: functions_boolean, name: and_not }
  status: todo
  params: [bool, bool]
  return: bool
  notes: no CEL equivalent; expressible as LogicalAnd(a, LogicalNot(b))

- id: xor
  substrait: { ext: functions_boolean, name: xor }
  status: todo
  params: [bool, bool]
  return: bool
  notes: no CEL equivalent; expressible as NotEqual(a, b) for booleans

- id: bool_and_agg
  substrait: { ext: functions_boolean, name: bool_and }
  status: discard
  notes: aggregate; handled by our accumulator framework

- id: bool_or_agg
  substrait: { ext: functions_boolean, name: bool_or }
  status: discard
  notes: aggregate; handled by our accumulator framework

# ═══════════════════════════════════════════════════════════════════════
#  COMPARISON
# ═══════════════════════════════════════════════════════════════════════

- id: equal
  internal: Equal
  cel: "_==_"
  substrait: { ext: functions_comparison, name: equal }
  status: mapped
  commutative: true
  null_semantics: propagate
  params: ["Comparable:T", "T"]
  return: bool
  notes: both params must unify. null input → null output. See null_safe_equal for SQL IS NOT DISTINCT FROM.

- id: not_equal
  internal: NotEqual
  cel: "_!=_"
  substrait: { ext: functions_comparison, name: not_equal }
  status: mapped
  commutative: true
  null_semantics: propagate
  params: ["Comparable:T", "T"]
  return: bool
  notes: both params must unify. null input → null output. See null_safe_not_equal for SQL IS DISTINCT FROM.

- id: less_than
  internal: LessThan
  cel: "_<_"
  substrait: { ext: functions_comparison, name: lt }
  status: mapped
  null_semantics: propagate
  params: ["Ordered:T", "T"]
  return: bool

- id: less_or_equal
  internal: LessOrEqual
  cel: "_<=_"
  substrait: { ext: functions_comparison, name: lte }
  status: mapped
  null_semantics: propagate
  params: ["Ordered:T", "T"]
  return: bool

- id: greater_than
  internal: GreaterThan
  cel: "_>_"
  substrait: { ext: functions_comparison, name: gt }
  status: mapped
  null_semantics: propagate
  params: ["Ordered:T", "T"]
  return: bool

- id: greater_or_equal
  internal: GreaterOrEqual
  cel: "_>=_"
  substrait: { ext: functions_comparison, name: gte }
  status: mapped
  null_semantics: propagate
  params: ["Ordered:T", "T"]
  return: bool

- id: between
  internal: Between
  substrait: { ext: functions_comparison, name: between }
  status: todo
  params: ["Ordered:T", "T", "T"]
  return: bool
  notes: no CEL equivalent; lower to LogicalAnd(GreaterOrEqual(x, lo), LessOrEqual(x, hi))

- id: null_safe_equal
  internal: NullSafeEqual
  substrait: { ext: functions_comparison, name: is_not_distinct_from }
  status: todo
  commutative: true
  null_semantics: consume
  params: ["Comparable:T?", "T?"]
  return: bool
  notes: SQL null-safe equality (null == null → true). Distinct from Equal which propagates null.

- id: null_safe_not_equal
  internal: NullSafeNotEqual
  substrait: { ext: functions_comparison, name: is_distinct_from }
  status: todo
  commutative: true
  null_semantics: consume
  params: ["Comparable:T?", "T?"]
  return: bool
  notes: SQL null-safe inequality (null != null → false). Distinct from NotEqual which propagates null.

- id: is_null
  internal: IsNull
  substrait: { ext: functions_comparison, name: is_null }
  status: todo
  null_semantics: consume
  params: ["T?"]
  return: bool
