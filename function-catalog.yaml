# ═══════════════════════════════════════════════════════════════════════
#  HIGHER-ORDER FUNCTIONS / CEL MACROS
# ═══════════════════════════════════════════════════════════════════════
# CEL desugars these into Comprehension nodes at parse time. In our IR
# they are first-class HOF nodes carrying the collection, a bound
# variable name, and a lambda body expression. This makes them
# pattern-matchable for optimization and maps cleanly to the
# corresponding Substrait HOFs.
#
# IR node shape for all HOFs:
#   collection: ExprId    — the list/map being iterated
#   binding: String       — the iteration variable name
#   body: ExprId          — lambda body expression (references binding)

- id: has
  internal: Has
  cel: has
  status: mapped
  hof: true
  notes: >
    Field presence test. In CEL, rewritten to Select with test_only=true.
    In our IR, the operand is the select expression being tested.
  params: [T]
  return: bool

- id: all
  internal: All
  cel: all
  substrait: { ext: functions_list, name: all_match }
  status: mapped
  hof: true
  params: ["list(T)"]
  return: bool
  lambda: { binding: T, return: bool }
  notes: true if predicate holds for all elements; short-circuits on false

- id: exists
  internal: Exists
  cel: exists
  substrait: { ext: functions_list, name: any_match }
  status: mapped
  hof: true
  params: ["list(T)"]
  return: bool
  lambda: { binding: T, return: bool }
  notes: true if predicate holds for any element; short-circuits on true

- id: exists_one
  internal: ExistsOne
  cel: exists_one
  status: mapped
  hof: true
  params: ["list(T)"]
  return: bool
  lambda: { binding: T, return: bool }
  notes: true if predicate holds for exactly one element; no short-circuit

- id: filter
  internal: Filter
  cel: filter
  substrait: { ext: functions_list, name: filter }
  status: mapped
  hof: true
  params: ["list(T)"]
  return: "list(T)"
  lambda: { binding: T, return: bool }

- id: map_transform
  internal: MapTransform
  cel: map
  substrait: { ext: functions_list, name: transform }
  status: mapped
  hof: true
  params: ["list(T)"]
  return: "list(T2)"
  lambda: { binding: T, return: T2 }
  notes: renamed from "map" to avoid collision with the Map type

- id: list_cardinality
  substrait: { ext: functions_list, name: cardinality }
  status: mapped
  notes: handled by size

- id: list_sort
  substrait: { ext: functions_list, name: sort }
  status: todo
  params: ["list(Ordered:T)"]
  return: "list(T)"

# ═══════════════════════════════════════════════════════════════════════
#  JSON (_meta extension; no CEL or Substrait equivalent)
# ═══════════════════════════════════════════════════════════════════════

- id: json_parse
  internal: JsonParse
  status: todo
  params: [string]
  return: any
  notes: >
    Parse a JSON string into a dynamically-typed value. Returns Any;
    caller must cast to a concrete type. JSON arrays become Array[Any],
    JSON objects become Map[String, Any].

- id: json_parse_struct
  internal: JsonParseStruct
  status: todo
  params: [string]
  return: struct
  notes: >
    Parse a JSON object string into a StructType. Field names in the JSON
    become struct field names; types are inferred or declared by schema.
    The common case: a varchar column containing an escaped JSON document.
    Unlike JsonParse, the target struct type must be known at compile time.

- id: json_stringify
  internal: JsonStringify
  status: todo
  params: [T]
  return: string
  notes: serialize any value to a JSON string

- id: json_extract
  internal: JsonExtract
  status: todo
  params: [string, string]
  return: any
  notes: >
    Extract a value from a JSON string by JSONPath-like expression.
    First param is the JSON string, second is the path (e.g. "$.shipping.country").
    Returns Any; avoids full parse when only one field is needed.

- id: json_extract_string
  internal: JsonExtractString
  status: todo
  params: [string, string]
  return: string
  notes: >
    Like JsonExtract but always returns the result as a string,
    even for numbers/booleans. Matches Trino's json_extract_scalar behavior.

# ═══════════════════════════════════════════════════════════════════════
#  NETWORK (_meta extension)
# ═══════════════════════════════════════════════════════════════════════

- id: cidr_contains
  internal: CidrContains
  status: todo
  params: [string, string]
  return: bool
  notes: >
    Tests whether an IP address (first param) falls within a CIDR block
    (second param, e.g. "10.0.0.0/8"). Supports both IPv4 and IPv6.
    Addresses are strings; we may introduce a native IP type later.

- id: cidr_match
  internal: CidrMatch
  status: todo
  params: [string, "list(string)"]
  return: bool
  notes: >
    Tests whether an IP address matches any CIDR block in a list.
    Sugar for exists(cidrs, c, CidrContains(ip, c)) but evaluable
    with a radix tree for large block lists.

- id: ip_to_int
  internal: IpToInt
  status: todo
  params: [string]
  return: uint
  notes: parse IPv4 to u32 or IPv6 to u128; useful for range comparisons

- id: int_to_ip
  internal: IntToIp
  status: todo
  params: [uint]
  return: string
  notes: render integer as dotted-quad (v4) or colon-hex (v6)

