#  CONDITIONAL
# ═══════════════════════════════════════════════════════════════════════

- id: conditional
  internal: Conditional
  cel: "_?_:_"
  status: mapped
  params: [bool, T, T]
  child_names: [condition, then_expr, else_expr]
  return: T

- id: case
  internal: Case
  status: mapped
  special: case
  notes: >
    Multi-way conditional. Arms are (condition, result) pairs evaluated
    in order; the first arm whose condition is true produces the result.
    The default is returned if no arm matches. Desugared from SQL CASE
    or nested if-then-else chains. Not a CEL native — lowered from
    nested Conditional nodes or authored directly in the IR.
    Special-cased in codegen: variable number of arms, not fixed arity.

